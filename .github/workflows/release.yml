name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to create, for example v0.1.0"
        required: true
        type: string
      prerelease:
        description: "Mark this GitHub release as a prerelease"
        required: true
        default: false
        type: boolean

permissions:
  contents: write

env:
  BIN_NAME: lazytmux

jobs:
  build-linux:
    name: Build Linux release
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Test
        run: cargo test --locked

      - name: Build release binary
        run: cargo build --release --locked

      - name: Package Linux binary
        run: |
          package="lazytmux-linux-x86_64"
          mkdir -p "dist/$package"
          cp "target/release/$BIN_NAME" "dist/$package/"
          cp README.md "dist/$package/"
          tar -czf "dist/$package.tar.gz" -C dist "$package"

      - name: Upload Linux package
        uses: actions/upload-artifact@v4
        with:
          name: lazytmux-linux-x86_64
          path: dist/lazytmux-linux-x86_64.tar.gz
          if-no-files-found: error

  build-macos:
    name: Build macOS release
    runs-on: macos-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install macOS Rust targets
        run: rustup target add x86_64-apple-darwin aarch64-apple-darwin

      - name: Test
        run: cargo test --locked

      - name: Build macOS binaries
        run: |
          cargo build --release --locked --target x86_64-apple-darwin
          cargo build --release --locked --target aarch64-apple-darwin

      - name: Package macOS universal binary
        run: |
          package="lazytmux-macos-universal"
          mkdir -p "dist/$package"
          lipo -create \
            -output "dist/$package/$BIN_NAME" \
            "target/x86_64-apple-darwin/release/$BIN_NAME" \
            "target/aarch64-apple-darwin/release/$BIN_NAME"
          chmod +x "dist/$package/$BIN_NAME"
          cp README.md "dist/$package/"
          tar -czf "dist/$package.tar.gz" -C dist "$package"

      - name: Upload macOS package
        uses: actions/upload-artifact@v4
        with:
          name: lazytmux-macos-universal
          path: dist/lazytmux-macos-universal.tar.gz
          if-no-files-found: error

  release:
    name: Create GitHub release
    runs-on: ubuntu-latest
    needs:
      - build-linux
      - build-macos
    steps:
      - name: Download release packages
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.tag }}
          PRERELEASE: ${{ inputs.prerelease }}
        run: |
          prerelease_args=""
          if [ "$PRERELEASE" = "true" ]; then
            prerelease_args="--prerelease"
          fi

          gh release create "$RELEASE_TAG" dist/*.tar.gz \
            --target "$GITHUB_SHA" \
            --title "$RELEASE_TAG" \
            --generate-notes \
            $prerelease_args
